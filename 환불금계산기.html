<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>중도포기 환불금 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 22px;
      color: #333;
      margin-bottom: 28px;
      font-weight: 700;
    }

    .calculator {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 860px;
      align-items: flex-start;
    }

    /* 입력 박스 */
    .input-box {
      flex: 1.4;
      background: #fff;
      border: 2px solid #339af0;
      border-radius: 12px;
      padding: 24px;
    }

    .box-title {
      font-size: 14px;
      font-weight: 700;
      color: #339af0;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e9ecef;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: #333;
      background: #f8f9fa;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus { border-color: #339af0; background: #fff; }

    .info-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .info-item {
      flex: 1;
      background: #f1f3f5;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .info-item .info-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .info-item .info-value {
      font-size: 16px;
      font-weight: 700;
      color: #339af0;
    }

    .info-item.empty .info-value { color: #ccc; }

    .calc-btn {
      width: 100%;
      padding: 11px;
      background: #339af0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .calc-btn:hover { background: #228be6; }
    .calc-btn:disabled { background: #adb5bd; cursor: not-allowed; }

    .reset-btn {
      width: 100%;
      padding: 9px;
      background: #fff;
      color: #868e96;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }

    .reset-btn:hover { background: #f1f3f5; }

    /* 결과 박스 */
    .result-box {
      flex: 1;
      background: #fff;
      border: 2px solid #2f9e44;
      border-radius: 12px;
      padding: 24px;
      min-height: 280px;
      display: flex;
      flex-direction: column;
    }

    .result-box .box-title { color: #2f9e44; border-bottom-color: #e9ecef; }

    .result-amount-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    .result-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .result-amount {
      font-size: 32px;
      font-weight: 700;
      color: #2f9e44;
      text-align: center;
    }

    .result-amount.empty { font-size: 15px; color: #ccc; }

    .result-detail {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #666;
      line-height: 1.8;
    }

    .result-detail.hidden { display: none; }

    .result-detail .formula {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #dee2e6;
      color: #888;
    }
  </style>
</head>
<body>

<h1>중도포기 환불금 계산기</h1>

<div class="calculator">

  <!-- 입력 박스 -->
  <div class="input-box">
    <div class="box-title">📋 과정 정보 입력</div>

    <div class="field">
      <label for="courseSelect">과정 선택</label>
      <select id="courseSelect">
        <option value="">— 과정을 선택하세요 —</option>
      </select>
    </div>

    <div class="info-row">
      <div class="info-item empty" id="feeItem">
        <div class="info-label">자부담금</div>
        <div class="info-value" id="feeDisplay">—</div>
      </div>
      <div class="info-item empty" id="sessionsItem">
        <div class="info-label">총 차시</div>
        <div class="info-value" id="sessionsDisplay">—</div>
      </div>
    </div>

    <div class="field">
      <label for="completedInput">수강한 차시</label>
      <input type="number" id="completedInput" placeholder="수강 완료한 차시 수를 입력하세요" min="0">
    </div>

    <button class="calc-btn" id="calcBtn" disabled>환불금 계산하기</button>
    <button class="reset-btn" id="resetBtn">초기화</button>
  </div>

  <!-- 결과 박스 -->
  <div class="result-box">
    <div class="box-title">💰 계산 결과</div>

    <div class="result-amount-area">
      <div class="result-label">환불금액</div>
      <div class="result-amount empty" id="resultAmount">과정을 선택하고<br>차시를 입력해주세요</div>
    </div>

    <div class="result-detail hidden" id="resultDetail"></div>
  </div>

</div>

<script>
// =============================================
// 📋 과정 데이터 수정 안내
// name: 과정명  fee: 자부담금(숫자만, 콤마 없이)  sessions: 총 차시
// 과정 추가: 목록 마지막에 줄 추가  { name: "과정명", fee: 숫자, sessions: 숫자 },
// 과정 삭제: 해당 줄 전체 삭제
// =============================================
const courses = [
  { name: "출판을 위한 디지털 편집디자인 인디자인 실무", fee: 47440, sessions: 22 },
  { name: "영상 편집 마스터 클래스, 프리미어 프로 베이직부터 레벨업하기", fee: 80390, sessions: 29 },
  { name: "ChatGPT로 실현하는 직장인 업무자동화의 모든 것", fee: 108420, sessions: 32 },
  { name: "AI 시대 일잘러가 되기 위한 엑셀 마스터 클래스", fee: 81320, sessions: 24 },
  { name: "ADsP(빅데이터준전문가) 최단기 합격패스", fee: 66530, sessions: 24 },
  { name: "다양한 AI 툴을 활용한 일관성 있는 AI 영상 제작 with Midjourney & Runway", fee: 52670, sessions: 19 },
  { name: "디자인 센스와 모션 감각을 한 번에 익히는 존코바의 애프터이펙트 / 모션그래픽", fee: 80390, sessions: 29 },
  { name: "skill-up 일잘러 PM을 위한 ChatGPT 활용 실무 바이블", fee: 24640, sessions: 16 },
  { name: "AI로 완성하는 마케팅 전략 수립과 비즈니스 글쓰기", fee: 51750, sessions: 24 },
  { name: "하나씩 따라하며 배우는 디자이너를 위한 클립스튜디오", fee: 69300, sessions: 25 },
  { name: "이미지부터 영상까지, ComfyUI 마스터 클래스(기본)", fee: 60990, sessions: 22 },
  { name: "Midjourney와 Stable diffusion으로 만드는 감쪽같은 AI 가상 모델", fee: 77620, sessions: 28 },
  { name: "LLM을 이용한 AI 서비스 개발부터 운영까지", fee: 44660, sessions: 29 },
  { name: "OpenAI API를 활용한 AI 튜터 영어 앱 개발", fee: 62530, sessions: 29 },
  { name: "Google Gemini와 Google workspace의 첫 만남: AI 혁신의 시작", fee: 40970, sessions: 19 },
  { name: "처음 시작하는 블렌더: 모델링부터 그리기까지 한 번에 익히기", fee: 85940, sessions: 31 },
  { name: "이디의 Figma 상세페이지 제작 마스터", fee: 23410, sessions: 16 },
  { name: "Docker 실무 입문, 컨테이너 빌드부터 배포까지", fee: 22280, sessions: 26 },
  { name: "모두를 위한 Figma Basic", fee: 27800, sessions: 19 },
  { name: "RAG으로 한 번에 배우는 LLM 서비스 개발", fee: 30310, sessions: 29 },
  { name: "AI 애니메이션 제작 실무로 크리에이티브 영상 완성하기", fee: 74850, sessions: 26 },
  { name: "AI를 통해 외주비용 절약하는 외식,카페 브랜드 마케팅 콘텐츠 제작 실무", fee: 49900, sessions: 17 },
  { name: "AI로 기업 해부하기, 투자 인사이트와 성장 전략 완전 정복", fee: 27720, sessions: 17 },
  { name: "코딩 없이 만드는 웹서비스 만들기, 홈페이지와 쇼핑몰 실전 제작", fee: 53900, sessions: 24 },
  { name: "반복 없는 회계, 자동화로 월 30시간 절약하는 실무 스킬", fee: 67760, sessions: 19 },
  { name: "AI로 백전백승 PPT 만드는 스킬", fee: 64380, sessions: 18 },
  { name: "출판까지 완성하는 그림책 기획,제작,작가 활동 올인원 실무", fee: 47440, sessions: 21 },
];
</script>

<script>
  // DOM 요소 참조
  const courseSelect = document.getElementById('courseSelect');
  const feeDisplay = document.getElementById('feeDisplay');
  const sessionsDisplay = document.getElementById('sessionsDisplay');
  const feeItem = document.getElementById('feeItem');
  const sessionsItem = document.getElementById('sessionsItem');
  const completedInput = document.getElementById('completedInput');
  const calcBtn = document.getElementById('calcBtn');
  const resultAmount = document.getElementById('resultAmount');
  const resultDetail = document.getElementById('resultDetail');

  // 과정 정보 초기화 함수 (Task 3에서도 사용하므로 여기서 정의)
  function resetCourseInfo() {
    feeDisplay.textContent = '—';
    sessionsDisplay.textContent = '—';
    feeItem.classList.add('empty');
    sessionsItem.classList.add('empty');
    completedInput.value = '';
    completedInput.max = '';
    calcBtn.disabled = true;
    resultAmount.innerHTML = '과정을 선택하고<br>차시를 입력해주세요';
    resultAmount.classList.add('empty');
    resultDetail.classList.add('hidden');
    resultDetail.innerHTML = '';
  }

  // 드롭다운에 과정 목록을 채우는 함수 (filtered: 표시할 과정 배열)
  function populateSelect(filtered) {
    courseSelect.innerHTML = '<option value="">— 과정을 선택하세요 —</option>';
    filtered.forEach((course) => {
      const option = document.createElement('option');
      // 전체 courses 배열에서의 원래 인덱스를 value로 사용
      option.value = courses.indexOf(course);
      option.textContent = course.name;
      courseSelect.appendChild(option);
    });
  }

  // 페이지 로드 시 전체 과정 목록으로 드롭다운 초기화
  populateSelect(courses);

  // 드롭다운 선택 시 과정 정보 표시
  courseSelect.addEventListener('change', () => {
    const idx = courseSelect.value;
    if (idx === '') {
      resetCourseInfo();
      return;
    }
    const course = courses[parseInt(idx)];
    feeDisplay.textContent = course.fee.toLocaleString('ko-KR') + '원';
    sessionsDisplay.textContent = course.sessions + '차시';
    feeItem.classList.remove('empty');
    sessionsItem.classList.remove('empty');
    completedInput.max = course.sessions;
    completedInput.value = '';
    calcBtn.disabled = true;
    // 결과 초기화
    resultAmount.innerHTML = '수강한 차시를<br>입력해주세요';
    resultAmount.classList.add('empty');
    resultDetail.classList.add('hidden');
  });

  // 수강 차시 입력 시 버튼 활성화 여부 결정
  completedInput.addEventListener('input', () => {
    const val = parseInt(completedInput.value);
    const idx = courseSelect.value;
    if (idx === '' || isNaN(val) || val < 0) {
      calcBtn.disabled = true;
      return;
    }
    calcBtn.disabled = false;
  });

  // 환불금 계산 함수
  // 계산식: (자부담금 / 총 차시) × (총 차시 - 수강 차시)
  function calcRefund(fee, totalSessions, completedSessions) {
    return Math.round((fee / totalSessions) * (totalSessions - completedSessions));
  }

  // 계산 버튼 클릭
  calcBtn.addEventListener('click', () => {
    const idx = parseInt(courseSelect.value);
    const course = courses[idx];
    if (isNaN(idx) || !course) return;
    const completed = parseInt(completedInput.value);

    // 입력값 유효성 검사
    if (isNaN(completed) || completed < 0) {
      alert('수강한 차시를 0 이상의 숫자로 입력해주세요.');
      return;
    }
    if (completed > course.sessions) {
      alert(`수강한 차시는 총 차시(${course.sessions}차시)를 초과할 수 없습니다.`);
      completedInput.value = course.sessions;
      return;
    }

    const refund = calcRefund(course.fee, course.sessions, completed);

    // 결과 표시
    resultAmount.textContent = refund.toLocaleString('ko-KR') + '원';
    resultAmount.classList.remove('empty');

    // 계산 내역 표시
    resultDetail.classList.remove('hidden');
    resultDetail.innerHTML = `
      <div>• 자부담금: ${course.fee.toLocaleString('ko-KR')}원</div>
      <div>• 총 차시: ${course.sessions}차시</div>
      <div>• 수강 차시: ${completed}차시</div>
      <div>• 잔여 차시: ${course.sessions - completed}차시</div>
      <div class="formula">
        (${course.fee.toLocaleString('ko-KR')} ÷ ${course.sessions}) × (${course.sessions} − ${completed})
        = ${refund.toLocaleString('ko-KR')}원
      </div>
    `;
  });

  // 초기화 버튼
  document.getElementById('resetBtn').addEventListener('click', () => {
    populateSelect(courses);
    courseSelect.value = '';
    resetCourseInfo();
  });
</script>

</body>
</html>
